<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px 15px 90px 15px; }
        
        .header { text-align: center; margin-bottom: 10px; padding: 10px; position: relative; }
        .header h3 { margin: 0 0 5px 0; font-size: 20px; }
        .header p { color: var(--hint-color); font-size: 13px; margin: 0; }
        .header-badges { position: absolute; right: 15px; top: 10px; display: flex; gap: 2px; }
        
        .panic-mode { background-color: rgba(229, 57, 53, 0.1); border: 2px solid #e53935; border-radius: 12px; }
        .panic-mode h3, .panic-mode p { color: #e53935 !important; font-weight: bold; }

        .stats-card { background: var(--secondary-bg); border-radius: 12px; padding: 12px; margin-bottom: 15px; text-align: center; }
        .stats-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .badge { background: rgba(255, 152, 0, 0.15); color: #e65100; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-blue { background: rgba(36, 129, 204, 0.15); color: var(--button-color); }
        .badge-green { background: rgba(67, 160, 71, 0.15); color: #2e7d32; }
        .badge-red { background: rgba(229, 57, 53, 0.15); color: #c62828; }
        
        .progress-wrapper { margin-bottom: 15px; }
        .progress-text { font-size: 13px; color: var(--hint-color); margin-bottom: 6px; text-align: center; font-weight: bold; }
        .progress-track { background: var(--secondary-bg); border-radius: 10px; height: 8px; width: 80%; margin: 0 auto; overflow: hidden; }
        .progress-fill { background: var(--button-color); height: 100%; width: 0%; transition: width 0.8s ease; }

        .filters-container { position: sticky; top: 0; z-index: 100; padding: 10px 0; background: var(--bg-color); opacity: 0.95; margin: 0 -15px 15px -15px; display: flex; justify-content: center; gap: 6px; }
        .filter-btn { background: var(--secondary-bg); color: var(--hint-color); border: none; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .filter-btn.active { background: var(--button-color); color: #ffffff; }
        .admin-btn { background: rgba(156, 39, 176, 0.2); color: #9c27b0; display: none; }

        .task-card { background: var(--secondary-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid transparent; }
        .card-overdue { border-left-color: #e53935; } .card-soon { border-left-color: #ffa000; } .card-ok { border-left-color: #43a047; }
        .completed { opacity: 0.5; text-decoration: line-through; border-left-color: var(--hint-color); }
        .task-info { flex-grow: 1; }
        .task-subject { font-size: 12px; color: var(--hint-color); font-weight: bold; text-transform: uppercase; }
        .task-title { font-size: 16px; margin: 4px 0; color: var(--text-color); }
        .task-deadline { font-size: 13px; margin-top: 2px; }
        
        .status-overdue { color: #e53935; font-weight: bold; } .status-soon { color: #ffa000; font-weight: bold; } .status-ok { color: var(--button-color); }
        
        .checkbox { width: 24px; height: 24px; border: 2px solid var(--button-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-left: 15px; min-width: 24px; }
        .checkbox.checked { background: var(--button-color); } .checkbox.checked::after { content: "✓"; color: #ffffff; font-weight: bold; }
        .checkbox.locked { border-color: #e53935; background: rgba(229, 57, 53, 0.1); font-size: 12px; }
        
        .subject-group-title { font-size: 13px; font-weight: bold; color: var(--button-color); margin: 20px 0 10px 5px; text-transform: uppercase; border-bottom: 1px solid var(--secondary-bg); padding-bottom: 5px; }

        /* Модалки */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 2000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-color); padding: 20px; border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; box-sizing: border-box; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close { position: absolute; right: 20px; top: 20px; font-size: 24px; color: var(--hint-color); background: none; border: none; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: var(--text-color); }
        
        /* Адмінка */
        select.admin-select { width: 100%; padding: 10px; border-radius: 8px; background: var(--secondary-bg); color: var(--text-color); border: none; margin-bottom: 15px; font-size: 16px; outline: none; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--secondary-bg); }
        .toggle-btn { background: #43a047; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .toggle-btn.absent { background: #e53935; }
        .save-btn { width: 100%; background: var(--button-color); color: white; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 15px; border: none;}

        .toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; transition: bottom 0.4s ease; z-index: 1000; display: flex; gap: 6px; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="header" id="mainHeader">
    <h3 id="userName">Привіт!</h3>
    <p id="headerSubtitle">Твої навчальні завдання</p>
    <div id="headerBadges" class="header-badges"></div>
</div>

<div class="stats-card" id="statsCard" style="display: none;">
    <div class="stats-row">
        <span id="rankBadge" class="badge badge-blue">🏆 Завантаження...</span>
        <span id="streakBadge" class="badge badge-green">🔥 Без боргів</span>
    </div>
    <div class="analytics-text" id="analyticsText">Аналізуємо твої успіхи...</div>
</div>

<div class="progress-wrapper" id="progressWrapper" style="display: none;">
    <div class="progress-text" id="progressText">Мій прогрес: 0%</div>
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
</div>

<div class="filters-container" id="filtersBlock" style="display: none;">
    <button class="filter-btn active" onclick="applyFilter('all', this)">Всі</button>
    <button class="filter-btn" onclick="applyFilter('overdue', this)">Борги</button>
    <button class="filter-btn" onclick="applyFilter('soon', this)">Горять</button>
    <button class="filter-btn admin-btn" id="adminBtn" onclick="openAdmin()">👑 Адмінка</button>
</div>

<div id="activeTaskList"></div>

<div id="adminModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('adminModal')">×</button>
        <div class="modal-title">👑 Панель Старости</div>
        
        <p style="font-size: 13px; color: var(--hint-color); margin-bottom: 5px;">Вибери поточну пару:</p>
        <select id="subjectSelect" class="admin-select">
            <option value="">Немає пар на сьогодні</option>
        </select>

        <p style="font-size: 13px; color: var(--hint-color);">Зелений - присутній, Червоний - відсутній.</p>
        <div class="rollcall-list" id="rollcallList"></div>
        <button class="save-btn" onclick="saveAttendance()">💾 Зберегти в базу</button>
    </div>
</div>

<div id="confirmModal" class="modal-overlay" style="align-items: center;">
    <div class="modal-content" style="border-radius: 16px; width: 80%; transform: translateY(20px);">
        <div class="modal-title" id="modalText" style="text-align: center;">Ти дійсно виконав це завдання?</div>
        <div style="display: flex; gap: 10px;">
            <button class="filter-btn" style="flex:1; background: var(--secondary-bg);" onclick="closeModal('confirmModal')">Ще роблю</button>
            <button class="filter-btn" style="flex:1; background: var(--button-color); color: white;" id="modalConfirmBtn">Так, готово!</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const API_URL = "https://telegram-proxy-bot-desz.onrender.com/api";
    const userId = tg.initDataUnsafe.user?.id || 1492389359; 
    const firstName = tg.initDataUnsafe.user?.first_name || 'Студент';
    
    const adminIds = [1492389359, 1654156923]; 
    if (adminIds.includes(userId)) { document.getElementById('adminBtn').style.display = 'inline-block'; }

    let globalTasks = [];
    let currentFilter = 'all';
    let pendingTaskId = null; let pendingTaskState = null;

    // СПИСОК ГРУПИ ДЛЯ АДМІНКИ
    const groupList = [
        "1. Базунов Дмитро", "2. Волков Микола", "3. Гриценко Микола", "4. Жук Тимофій", "5. Калашник Даниїл",
        "6. Клименко Іван", "8. Мартиненко Валерій", "9. Постернак Роман", "10. Притула Дмитро",
        "12. Скірко Анна", "13. Узун Дмитро", "14. Фулга Іван", "15. Ханчопуло Ольга"
    ];

    async function loadData() {
        try {
            // 🔒 ВИКОРИСТОВУЄМО ЗАХИЩЕНІ ЗАПИТИ ДО C# СЕРВЕРА
            const headers = { 'Authorization': 'tma ' + tg.initData };
            
            // 1. Завантажуємо завдання
            const tasksRes = await fetch(`${API_URL}/tasks`, { headers });
            if (tasksRes.ok) {
                globalTasks = await tasksRes.json();
                document.getElementById('filtersBlock').style.display = "flex";
                document.getElementById('statsCard').style.display = "block";
                renderTasks();
            }

            // 2. Завантажуємо рейтинг
            const rankRes = await fetch(`${API_URL}/rank/${userId}`);
            if (rankRes.ok) {
                const rankData = await rankRes.json();
                let medal = "🏆";
                if(rankData.rank === 1) medal = "🥇"; else if(rankData.rank === 2) medal = "🥈"; else if(rankData.rank === 3) medal = "🥉";
                document.getElementById('rankBadge').innerText = `${medal} ${rankData.rank} місце з ${rankData.total}`;
            }
        } catch (e) {
            document.getElementById('activeTaskList').innerHTML = "<p style='text-align:center;'>Не вдалося завантажити дані 🔒</p>";
        }
    }

    function applyFilter(filterType, btnElement) {
        currentFilter = filterType;
        document.querySelectorAll('#filtersBlock .filter-btn').forEach(btn => { if (!btn.classList.contains('admin-btn')) btn.classList.remove('active') });
        btnElement.classList.add('active');
        renderTasks();
    }

    // --- ЛОГІКА РОЗКЛАДУ ДЛЯ АДМІНКИ ---
    function getTodaysSubjects() {
        const semesterStart = new Date('2026-03-02T00:00:00');
        const now = new Date();
        const diffDays = Math.floor((now - semesterStart) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return [];

        const weekType = Math.floor(diffDays / 7) % 2 === 0 ? 1 : 2;
        const day = now.getDay(); // 1 = Пн, 5 = Пт

        if (weekType === 1) {
            if (day === 1) return ["Основи здоров'я", "Українська мова", "Фізика"];
            if (day === 2) return ["Фізика", "Теорія алгоритмів", "Українська мова"];
            if (day === 3) return ["Програмування", "Англійська мова", "Чисельні методи"];
            if (day === 4) return ["Програмування", "Чисельні методи", "Вища математика"];
            if (day === 5) return ["Теорія алгоритмів", "Вища математика"];
        } else {
            if (day === 1) return ["Основи здоров'я", "Фізика"];
            if (day === 2) return ["Фізика", "Теорія алгоритмів"];
            if (day === 3) return ["Програмування", "Англійська мова", "Чисельні методи"];
            if (day === 4) return ["Програмування", "Чисельні методи", "Вища математика"];
            if (day === 5) return ["Теорія алгоритмів", "Вища математика"];
        }
        return [];
    }

    function openAdmin() { 
        document.getElementById('adminModal').classList.add('active'); 
        
        // Генеруємо предмети на сьогодні
        const select = document.getElementById('subjectSelect');
        const subjects = getTodaysSubjects();
        select.innerHTML = "";
        if (subjects.length === 0) {
            select.innerHTML = '<option value="">Сьогодні пар немає 🎉</option>';
        } else {
            subjects.forEach(sub => {
                select.innerHTML += `<option value="${sub}">${sub}</option>`;
            });
        }

        // Генеруємо список групи
        const listHtml = document.getElementById('rollcallList');
        listHtml.innerHTML = "";
        groupList.forEach((student, index) => {
            listHtml.innerHTML += `
                <div class="student-row">
                    <span style="font-weight: bold;">${student}</span>
                    <button class="toggle-btn present" onclick="toggleAttendance(this)">🟢 Є</button>
                </div>
            `;
        });
    }

    function toggleAttendance(btn) {
        if (btn.classList.contains('present')) {
            btn.classList.remove('present'); btn.classList.add('absent');
            btn.innerText = "🔴 Нема"; tg.HapticFeedback.impactOccurred('light');
        } else {
            btn.classList.remove('absent'); btn.classList.add('present');
            btn.innerText = "🟢 Є"; tg.HapticFeedback.impactOccurred('medium');
        }
    }

    function saveAttendance() {
        // У майбутньому тут буде fetch-запит до C# для збереження відвідуваності
        const subject = document.getElementById('subjectSelect').value;
        if(!subject) { tg.showAlert("Немає предмету для збереження!"); return; }
        
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert(`✅ Журнал з предмету "${subject}" збережено!`);
        closeModal('adminModal');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // --- ВІДОБРАЖЕННЯ ЗАВДАНЬ ---
    function renderTasks() {
        const activeList = document.getElementById('activeTaskList');
        activeList.innerHTML = "";
        
        let activeTasks = globalTasks.filter(t => !t.isCompleted && !t.IsCompleted);
        const percent = globalTasks.length > 0 ? Math.round(((globalTasks.length - activeTasks.length) / globalTasks.length) * 100) : 0;
        
        document.getElementById('progressWrapper').style.display = "block";
        document.getElementById('progressBar').style.width = `${percent}%`;

        document.getElementById('userName').innerText = `Привіт, ${firstName}!`;
        if(adminIds.includes(userId)) document.getElementById('headerBadges').innerHTML = '<span style="font-size: 18px;" title="Адмін">👑</span>';

        if (currentFilter === 'overdue') activeTasks = activeTasks.filter(t => (new Date(t.deadline || t.Deadline) - new Date()) < 0);
        else if (currentFilter === 'soon') activeTasks = activeTasks.filter(t => {
            const diffDays = Math.ceil((new Date(t.deadline || t.Deadline) - new Date()) / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 2;
        });

        if (activeTasks.length === 0) activeList.innerHTML = "<p style='text-align:center;'>Список порожній! 🎉</p>";
        else {
            activeTasks.forEach(task => { activeList.appendChild(createTaskCard(task)); });
        }
    }

    function createTaskCard(task) {
        let title = task.title || task.Title;
        const deadlineStr = task.deadline || task.Deadline;
        const taskId = task.taskId || task.TaskId;
        const isStrict = title.includes('[lock]');
        if(isStrict) title = title.replace('[lock]', '').trim();

        const diffDays = Math.ceil((new Date(deadlineStr) - new Date()) / (1000 * 60 * 60 * 24));
        const dateStr = new Date(deadlineStr).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });

        let statusClass = "status-ok", borderClass = "card-ok", statusText = `Залишилось днів: ${diffDays} (до ${dateStr})`;
        const isLocked = diffDays < 0 && isStrict;

        if (diffDays < 0) { statusClass = "status-overdue"; borderClass = "card-overdue"; statusText = `ПРОТЕРМІНОВАНО!`; } 
        else if (diffDays <= 2) { statusClass = "status-soon"; borderClass = "card-soon"; statusText = `Скоро! (до ${dateStr})`; }

        const card = document.createElement('div'); card.className = `task-card ${borderClass}`;
        card.innerHTML = `
            <div class="task-info">
                <div class="task-subject">${task.subject || task.Subject}</div>
                <div class="task-title">${title}</div>
                <div class="task-deadline ${statusClass}">${statusText}</div>
            </div>
            <div class="checkbox ${isLocked ? 'locked' : ''}" onclick="openModal(${taskId}, false, ${isLocked})">${isLocked ? '🔒' : ''}</div>
        `;
        return card;
    }

    function showToast(msg, bg) {
        const t = document.getElementById('toast'); t.innerHTML = `<span>${msg}</span>`; t.style.background = bg;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openModal(taskId, state, isLocked) {
        pendingTaskId = taskId; pendingTaskState = state;
        const modal = document.getElementById('confirmModal');
        const text = document.getElementById('modalText');
        const btn = document.getElementById('modalConfirmBtn');
        
        if(isLocked) {
            text.innerText = "⚠️ Роботу закрито.\nВідмічай ТІЛЬКИ якщо здав викладачу до дедлайну!";
            btn.style.background = "#e53935"; btn.innerText = "Я здав вчасно!";
        } else {
            text.innerText = "Ти дійсно виконав це завдання?";
            btn.style.background = "var(--button-color)"; btn.innerText = "Так, готово!";
        }
        modal.classList.add('active');
    }

    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
        if (!pendingTaskId) return;
        const taskId = pendingTaskId; closeModal('confirmModal');
        try {
            // 🔒 ЗАХИЩЕНИЙ ЗАПИТ
            const response = await fetch(`${API_URL}/tasks/complete/${taskId}`, { 
                method: 'POST', headers: { 'Authorization': 'tma ' + tg.initData }
            });
            if (response.ok) {
                confetti({ particleCount: 100, origin: { y: 0.6 } });
                showToast("Завдання виконано! 🎉", "#43a047");
                setTimeout(loadData, 400); // Оновлюємо таски і рейтинг
            } else showToast("Помилка на сервері ❌", "#e53935");
        } catch (e) { showToast("Помилка зв'язку ❌", "#e53935"); }
    });

    loadData();
</script>

</body>
</html>
