<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px 15px 90px 15px; /* Збільшив відступ знизу для тосту */
            overflow-x: hidden;
        }

        /* --- ШАПКА ТА РЕЖИМ ПАНІКИ --- */
        .header { 
            text-align: center; 
            margin-bottom: 10px; 
            transition: all 0.4s ease;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid transparent;
        }
        .header h3 { margin: 0 0 5px 0; font-size: 20px; transition: color 0.3s; }
        .header p { color: var(--hint-color); font-size: 13px; margin: 0; transition: color 0.3s; }

        .panic-mode {
            background-color: rgba(229, 57, 53, 0.1);
            border-color: #e53935;
            animation: panicPulse 1.5s infinite;
        }
        .panic-mode h3, .panic-mode p { color: #e53935 !important; font-weight: bold; }
        @keyframes panicPulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        /* --- АЧІВКИ ТА СТАТИСТИКА --- */
        .stats-card {
            background: var(--secondary-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255, 152, 0, 0.15);
            color: #e65100;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-blue { background: rgba(36, 129, 204, 0.15); color: var(--button-color); }
        .badge-green { background: rgba(67, 160, 71, 0.15); color: #2e7d32; }
        .badge-red { background: rgba(229, 57, 53, 0.15); color: #c62828; }
        
        .analytics-text {
            font-size: 12px;
            color: var(--hint-color);
            line-height: 1.4;
        }
        
        /* --- ПРОГРЕС-БАР --- */
        .progress-wrapper { margin-bottom: 15px; }
        .progress-text { font-size: 13px; color: var(--hint-color); margin-bottom: 6px; text-align: center; font-weight: bold; }
        .progress-track { background: var(--secondary-bg); border-radius: 10px; height: 8px; overflow: hidden; width: 80%; margin: 0 auto; }
        .progress-fill { background: var(--button-color); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 10px; }

        /* --- ФІЛЬТРИ --- */
        .filters { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .filter-btn {
            background: var(--secondary-bg); color: var(--hint-color); border: none; padding: 8px 16px;
            border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .filter-btn.active { background: var(--button-color); color: #ffffff; }

        /* --- СКЕЛЕТНЕ ЗАВАНТАЖЕННЯ --- */
        .skeleton-card {
            background: var(--secondary-bg); border-radius: 12px; height: 70px; margin-bottom: 12px;
            animation: pulse 1.5s infinite ease-in-out; opacity: 0.6;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }

        /* --- КАРТКИ ЗАВДАНЬ --- */
        .task-card {
            background: var(--secondary-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 5px solid transparent; transition: all 0.3s ease; 
        }

        .card-overdue { border-left-color: #e53935; }
        .card-soon { border-left-color: #ffa000; }
        .card-ok { border-left-color: #43a047; }
        .completed { opacity: 0.5; text-decoration: line-through; border-left-color: var(--hint-color); }

        .completing { opacity: 0 !important; transform: translateX(-30px) scale(0.95); }

        .task-info { flex-grow: 1; }
        .task-subject { font-size: 12px; color: var(--hint-color); font-weight: bold; text-transform: uppercase; }
        .task-title { font-size: 16px; margin: 4px 0; }
        .task-deadline { font-size: 13px; }

        .status-overdue { color: #e53935; font-weight: bold; }
        .status-soon { color: #ffa000; font-weight: bold; }
        .status-ok { color: #43a047; }

        .checkbox {
            width: 24px; height: 24px; border: 2px solid var(--button-color); border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; margin-left: 15px; min-width: 24px; transition: all 0.2s;
        }
        .checkbox.checked { background: var(--button-color); }
        .checkbox.checked::after { content: "✓"; color: #ffffff; font-weight: bold; }

        .subject-group-title {
            font-size: 13px; font-weight: bold; color: var(--button-color); margin: 20px 0 10px 5px;
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--secondary-bg); padding-bottom: 5px;
        }

        /* --- ВИКОНАНІ ЗАВДАННЯ --- */
        details { margin-top: 25px; border-top: 1px solid var(--hint-color); padding-top: 10px; }
        summary { display: flex; justify-content: space-between; align-items: center; padding: 10px; font-weight: bold; color: var(--hint-color); cursor: pointer; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: "▼"; font-size: 12px; transition: transform 0.3s; color: var(--hint-color); }
        details[open] summary::after { transform: rotate(180deg); }
        .completed-container .task-card { background: transparent; border: 1px solid var(--secondary-bg); filter: grayscale(1); border-left-width: 1px; }

        /* --- ВЛАСНІ МОДАЛКИ (ВНИЗУ ЕКРАНА!) --- */
        .toast {
            position: fixed; 
            bottom: -80px; /* Змінено з top на bottom */
            left: 50%; 
            transform: translateX(-50%);
            background: #43a047; color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .toast.show { bottom: 30px; } /* Виїжджає знизу */

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 2000; backdrop-filter: blur(3px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-color); padding: 20px; border-radius: 16px; width: 80%;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transform: translateY(20px); transition: transform 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: var(--secondary-bg); color: var(--text-color); }
        .btn-confirm { background: var(--button-color); color: #ffffff; }

    </style>
</head>
<body>

<div class="header" id="mainHeader">
    <h3 id="userName">Привіт!</h3>
    <p id="headerSubtitle">Твої навчальні завдання</p>
</div>

<div class="stats-card" id="statsCard" style="display: none;">
    <div class="stats-row">
        <span id="streakBadge" class="badge badge-green">🔥 Без боргів</span>
        <span id="levelBadge" class="badge badge-blue">🤓 Студент</span>
    </div>
    <div class="analytics-text" id="analyticsText">Аналізуємо твої успіхи...</div>
</div>

<div class="progress-wrapper" id="progressWrapper" style="display: none;">
    <div class="progress-text" id="progressText">Мій прогрес: 0%</div>
    <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
    </div>
</div>

<div class="filters" id="filtersBlock" style="display: none;">
    <button class="filter-btn active" onclick="applyFilter('all', this)">Всі</button>
    <button class="filter-btn" onclick="applyFilter('overdue', this)">Борги 🟥</button>
    <button class="filter-btn" onclick="applyFilter('soon', this)">Горять 🟨</button>
</div>

<div id="activeTaskList">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
</div>

<details id="completedSection" style="display: none;">
    <summary>Виконані завдання (<span id="completedCount">0</span>)</summary>
    <div id="completedTaskList" class="completed-container"></div>
</details>

<div id="toast" class="toast">Завдання виконано! 🎉</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" id="modalText">Ти дійсно виконав це завдання?</div>
        <div class="modal-buttons">
            <button class="modal-btn btn-cancel" onclick="closeModal()">Ще роблю</button>
            <button class="modal-btn btn-confirm" id="modalConfirmBtn">Так, готово!</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://telegram-proxy-bot-desz.onrender.com/api";
    const userId = tg.initDataUnsafe.user?.id || 1492389359; 
    const firstName = tg.initDataUnsafe.user?.first_name || 'Студент';
    
    document.getElementById('userName').innerText = `Привіт, ${firstName}!`;

    let globalTasks = [];
    let currentFilter = 'all';
    let pendingTaskId = null;
    let pendingTaskState = null;
    let toastTimeout; // Таймер для тосту, щоб не зависав!

    async function loadTasks() {
        try {
            const response = await fetch(`${API_URL}/tasks/${userId}`);
            globalTasks = await response.json();
            document.getElementById('filtersBlock').style.display = "flex";
            document.getElementById('statsCard').style.display = "block";
            renderTasks();
        } catch (e) {
            document.getElementById('activeTaskList').innerHTML = "<p style='text-align:center;'>Не вдалося завантажити завдання :(</p>";
        }
    }

    function applyFilter(filterType, btnElement) {
        currentFilter = filterType;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        tg.HapticFeedback.selectionChanged();
        renderTasks();
    }

    function renderTasks() {
        const activeList = document.getElementById('activeTaskList');
        const completedList = document.getElementById('completedTaskList');
        const completedSection = document.getElementById('completedSection');
        const completedCount = document.getElementById('completedCount');
        
        const progressWrapper = document.getElementById('progressWrapper');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        
        const mainHeader = document.getElementById('mainHeader');
        const userNameText = document.getElementById('userName');
        const headerSubtitle = document.getElementById('headerSubtitle');

        // Елементи ачівок
        const streakBadge = document.getElementById('streakBadge');
        const levelBadge = document.getElementById('levelBadge');
        const analyticsText = document.getElementById('analyticsText');

        activeList.innerHTML = "";
        completedList.innerHTML = "";

        if (globalTasks.length === 0) {
            activeList.innerHTML = "<p style='text-align:center;'>Завдань поки немає. Відпочивай! 🎉</p>";
            document.getElementById('filtersBlock').style.display = "none";
            document.getElementById('statsCard').style.display = "none";
            completedSection.style.display = "none";
            progressWrapper.style.display = "none";
            return;
        }

        let activeTasks = globalTasks.filter(t => !(t.isCompleted !== undefined ? t.isCompleted : t.IsCompleted));
        const completedTasks = globalTasks.filter(t => (t.isCompleted !== undefined ? t.isCompleted : t.IsCompleted));

        const now = new Date();
        const overdueCount = activeTasks.filter(t => (new Date(t.deadline || t.Deadline) - now) < 0).length;
        const percent = Math.round((completedTasks.length / globalTasks.length) * 100);

        // --- ЛОГІКА АЧІВОК ТА СТАТИСТИКИ ---
        if (overdueCount === 0) {
            streakBadge.className = 'badge badge-green';
            streakBadge.innerHTML = '🔥 Без боргів';
        } else {
            streakBadge.className = 'badge badge-red';
            streakBadge.innerHTML = `🧊 Боргів: ${overdueCount}`;
        }

        if (percent === 100) {
            levelBadge.innerHTML = '👑 Легенда';
            levelBadge.className = 'badge badge-green';
            analyticsText.innerHTML = '<b>Ідеально!</b> Ти розніс усі таски. Краще не буває.';
        } else if (percent >= 80) {
            levelBadge.innerHTML = '🚀 Турбо-студент';
            levelBadge.className = 'badge badge-blue';
            analyticsText.innerHTML = 'Ти йдеш краще за більшість групи! Так тримати.';
        } else if (percent >= 50) {
            levelBadge.innerHTML = '💪 Стабільний';
            levelBadge.className = 'badge badge-blue';
            analyticsText.innerHTML = 'Більша половина вже закрита. Головне не зупинятись!';
        } else if (percent > 0) {
            levelBadge.innerHTML = '🐢 Початківець';
            levelBadge.className = 'badge';
            analyticsText.innerHTML = 'Треба трохи піднажати, щоб не назбирати сніговий ком.';
        } else {
            levelBadge.innerHTML = '💤 АФК';
            levelBadge.className = 'badge badge-red';
            analyticsText.innerHTML = 'Ти ще не починав. Давай, зроби хоча б одне завдання!';
        }

        // --- ЛОГІКА РЕЖИМУ "ПАНІКА" ---
        if (overdueCount >= 5) {
            mainHeader.classList.add('panic-mode');
            userNameText.innerText = "🚨 УВАГА!";
            headerSubtitle.innerText = `У тебе горять борги: ${overdueCount} шт. Бігом робити!`;
            tg.HapticFeedback.notificationOccurred('error'); 
        } else {
            mainHeader.classList.remove('panic-mode');
            userNameText.innerText = `Привіт, ${firstName}!`;
            headerSubtitle.innerText = "Твої навчальні завдання";
        }

        progressWrapper.style.display = "block";
        progressText.innerText = `Мій прогрес: ${completedTasks.length} з ${globalTasks.length} (${percent}%)`;
        setTimeout(() => { progressBar.style.width = `${percent}%`; }, 100);

        if (currentFilter === 'overdue') {
            activeTasks = activeTasks.filter(t => (new Date(t.deadline || t.Deadline) - now) < 0);
        } else if (currentFilter === 'soon') {
            activeTasks = activeTasks.filter(t => {
                const diffDays = Math.ceil((new Date(t.deadline || t.Deadline) - now) / (1000 * 60 * 60 * 24));
                return diffDays >= 0 && diffDays <= 2;
            });
        }

        if (activeTasks.length === 0) {
            if (currentFilter === 'overdue') activeList.innerHTML = "<p style='text-align:center;'>У тебе немає боргів! Ти супер! 🚀</p>";
            else if (currentFilter === 'soon') activeList.innerHTML = "<p style='text-align:center;'>На найближчі дні все чисто! 😎</p>";
            else {
                activeList.innerHTML = `
                    <div style="text-align:center; padding: 30px 10px;">
                        <span style="font-size: 50px;">🏆</span>
                        <h3 style="margin-top: 10px;">Ти машина!</h3>
                        <p style="color: var(--hint-color)">Усі завдання виконано. Можна йти пити чай ☕</p>
                    </div>`;
            }
        } else {
            renderGroupedTasks(activeTasks, activeList);
        }

        if (completedTasks.length > 0) {
            completedSection.style.display = "block";
            completedCount.innerText = completedTasks.length;
            renderGroupedTasks(completedTasks, completedList);
        } else {
            completedSection.style.display = "none";
        }
    }

    function renderGroupedTasks(tasksArray, container) {
        const grouped = {};
        tasksArray.forEach(task => {
            const subject = task.subject || task.Subject || "Інше";
            if (!grouped[subject]) grouped[subject] = [];
            grouped[subject].push(task);
        });

        for (const subject in grouped) {
            grouped[subject].sort((a, b) => new Date(a.deadline || a.Deadline) - new Date(b.deadline || b.Deadline));
            const subjectHeader = document.createElement('div');
            subjectHeader.className = 'subject-group-title';
            subjectHeader.innerText = subject;
            container.appendChild(subjectHeader);

            grouped[subject].forEach(task => { container.appendChild(createTaskCard(task, false)); });
        }
    }

    function createTaskCard(task, showSubject = true) {
        const subject = task.subject || task.Subject;
        const title = task.title || task.Title;
        const deadlineStr = task.deadline || task.Deadline;
        const isCompleted = task.isCompleted !== undefined ? task.isCompleted : task.IsCompleted;
        const taskId = task.taskId || task.TaskId;

        const timeDiff = new Date(deadlineStr) - new Date();
        const diffDays = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

        let statusClass = "status-ok", cardBorderClass = "card-ok", statusText = `Залишилось днів: ${diffDays}`;

        if (timeDiff < 0) {
            statusClass = "status-overdue"; cardBorderClass = "card-overdue"; statusText = "ПРОТЕРМІНОВАНО!";
        } else if (diffDays <= 2) {
            statusClass = "status-soon"; cardBorderClass = "card-soon"; statusText = `Дедлайн скоро! (${diffDays} дн.)`;
        }

        const card = document.createElement('div');
        card.id = `task-${taskId}`;
        card.className = `task-card ${cardBorderClass} ${isCompleted ? 'completed' : ''}`;
        
        card.innerHTML = `
            <div class="task-info">
                ${showSubject ? `<div class="task-subject">${subject}</div>` : ''}
                <div class="task-title">${title}</div>
                <div class="task-deadline ${statusClass}">${isCompleted ? 'Виконано' : statusText}</div>
            </div>
            <div class="checkbox ${isCompleted ? 'checked' : ''}" onclick="openModal(${taskId}, ${isCompleted})"></div>
        `;
        return card;
    }

    // --- ПОКРАЩЕНИЙ ТОСТ (ВНИЗУ, НЕ ЗАВИСАЄ) ---
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.add('show');
        
        // Збиваємо старий таймер, якщо швидко натиснули двічі
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function openModal(taskId, currentState) {
        pendingTaskId = taskId; pendingTaskState = currentState;
        tg.HapticFeedback.impactOccurred('light');

        document.getElementById('modalText').innerText = currentState ? "Повернути завдання в роботу?" : "Ти дійсно виконав це завдання?";
        document.getElementById('modalConfirmBtn').innerText = currentState ? "Так, повернути" : "Так, готово!";
        document.getElementById('confirmModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('confirmModal').classList.remove('active');
        pendingTaskId = null;
    }

    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
        if (!pendingTaskId) return;
        const taskId = pendingTaskId, currentState = pendingTaskState;
        closeModal();

        tg.HapticFeedback.impactOccurred('medium');
        const cardElement = document.getElementById(`task-${taskId}`);
        if (cardElement) cardElement.classList.add('completing');

        try {
            const response = await fetch(`${API_URL}/tasks/${userId}/complete/${taskId}`, { method: 'POST' });
            if (response.ok) {
                if (!currentState) {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#43a047', '#2481cc', '#ffa000'] });
                    showToast("Завдання виконано! 🎉");
                } else { showToast("Завдання повернуто в роботу"); }
                setTimeout(() => { loadTasks(); }, 400);
            } else {
                showToast("❌ Помилка на сервері!");
                if (cardElement) cardElement.classList.remove('completing');
            }
        } catch (e) {
            showToast("❌ Помилка зв'язку!");
            if (cardElement) cardElement.classList.remove('completing');
        }
    });

    loadTasks();
</script>

</body>
</html>
