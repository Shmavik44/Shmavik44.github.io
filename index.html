<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: var(--tg-theme-bg-color, #ffffff); --text-color: var(--tg-theme-text-color, #222222); --hint-color: var(--tg-theme-hint-color, #999999); --button-color: var(--tg-theme-button-color, #2481cc); --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5); }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px 15px 90px 15px; }
        
        .header { text-align: center; margin-bottom: 10px; padding: 15px 10px; border-radius: 12px; background: var(--secondary-bg); position: relative; }
        .header h3 { margin: 0 0 5px 0; font-size: 20px; }
        .user-title { display: inline-block; background: rgba(255, 152, 0, 0.2); color: #e65100; padding: 3px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .header-badges { position: absolute; right: 15px; top: 10px; display: flex; gap: 2px; }
        
        .stats-card { background: var(--secondary-bg); border-radius: 12px; padding: 12px; margin-bottom: 15px; text-align: center; }
        .stats-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-blue { background: rgba(36, 129, 204, 0.15); color: var(--button-color); }
        .badge-green { background: rgba(67, 160, 71, 0.15); color: #2e7d32; }
        .badge-red { background: rgba(229, 57, 53, 0.15); color: #c62828; }
        .analytics-text { font-size: 12px; color: var(--hint-color); line-height: 1.4; margin-top: 5px; }
        
        .progress-wrapper { margin-bottom: 15px; }
        .progress-text { font-size: 13px; color: var(--hint-color); margin-bottom: 6px; text-align: center; font-weight: bold; }
        .progress-track { background: var(--secondary-bg); border-radius: 10px; height: 8px; width: 80%; margin: 0 auto; overflow: hidden; }
        .progress-fill { background: var(--button-color); height: 100%; width: 0%; transition: width 0.8s ease; }

        .filters-container { position: sticky; top: 0; z-index: 100; padding: 10px 0; background: var(--bg-color); margin: 0 -15px 15px -15px; display: flex; justify-content: center; gap: 6px; flex-wrap: wrap;}
        .filter-btn { background: var(--secondary-bg); color: var(--hint-color); border: none; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .filter-btn.active { background: var(--button-color); color: #ffffff; }
        .shop-btn { background: rgba(255, 152, 0, 0.15); color: #e65100; }
        .lib-btn { background: rgba(76, 175, 80, 0.15); color: #2e7d32; }
        .admin-btn { background: rgba(156, 39, 176, 0.2); color: #9c27b0; display: none; }

        .task-card { background: var(--secondary-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid transparent; }
        .card-overdue { border-left-color: #e53935; } .card-soon { border-left-color: #ffa000; } .card-ok { border-left-color: #43a047; }
        .completed { opacity: 0.5; text-decoration: line-through; border-left-color: var(--hint-color); }
        .completing { opacity: 0 !important; transform: translateX(-30px); transition: all 0.3s; }
        
        .task-info { flex-grow: 1; }
        .task-subject { font-size: 12px; color: var(--hint-color); font-weight: bold; text-transform: uppercase; }
        .task-title { font-size: 16px; margin: 4px 0; color: var(--text-color); }
        .task-deadline { font-size: 13px; margin-top: 2px; }
        
        .status-overdue { color: #e53935; font-weight: bold; } .status-soon { color: #ffa000; font-weight: bold; } .status-ok { color: #43a047; } 
        
        .checkbox { width: 24px; height: 24px; border: 2px solid var(--button-color); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-left: 15px; min-width: 24px; cursor: pointer;}
        .checkbox.checked { background: var(--button-color); } .checkbox.checked::after { content: "✓"; color: #ffffff; font-weight: bold; }
        
        .subject-group-title { font-size: 13px; font-weight: bold; color: var(--button-color); margin: 20px 0 10px 5px; text-transform: uppercase; border-bottom: 1px solid var(--secondary-bg); padding-bottom: 5px; }

        details { margin-top: 25px; border-top: 1px solid var(--hint-color); padding-top: 10px; }
        summary { padding: 10px; font-weight: bold; color: var(--hint-color); cursor: pointer; list-style: none; }
        .completed-container .task-card { background: transparent; border: 1px solid var(--secondary-bg); filter: grayscale(1); border-left-width: 1px; }

        /* Модалки */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 2000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-color); padding: 20px; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s; box-sizing: border-box; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close { position: absolute; right: 20px; top: 20px; font-size: 24px; color: var(--hint-color); background: none; border: none; cursor: pointer; }
        
        .shop-item { background: var(--secondary-bg); border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .shop-info h4 { margin: 0 0 4px 0; font-size: 15px;} .shop-info p { margin: 0; font-size: 11px; color: var(--hint-color); }
        .buy-btn { background: #ff8f00; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px;}
        .buy-btn.owned { background: var(--button-color); } .buy-btn.active-title { background: #43a047; }
        .coin-balance { font-size: 14px; font-weight: bold; color: #ff8f00; background: rgba(255, 193, 7, 0.2); padding: 5px 10px; border-radius: 10px;}

        .toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; transition: bottom 0.4s ease; z-index: 3000; }
        .toast.show { bottom: 30px; }
    </style>
</head>
<body>

<div class="header" id="mainHeader">
    <h3 id="userName">Привіт!</h3>
    <div class="user-title" id="userTitleBadge" style="display: none;"></div>
    <div id="headerBadges" class="header-badges"></div>
</div>

<div class="stats-card" id="statsCard" style="display: none;">
    <div class="stats-row">
        <span id="streakBadge" class="badge badge-green">🔥 Без боргів</span>
        <span id="levelBadge" class="badge badge-blue">🤓 Студент</span>
        <span id="rankBadge" class="badge badge-blue">🏆 ...</span>
    </div>
    <div class="analytics-text" id="analyticsText">Аналізуємо твої успіхи...</div>
</div>

<div class="progress-wrapper" id="progressWrapper" style="display: none;">
    <div class="progress-text" id="progressText">Мій прогрес: 0%</div>
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
</div>

<div class="filters-container" id="filtersBlock" style="display: none;">
    <button class="filter-btn active" onclick="applyFilter('all', this)">Всі</button>
    <button class="filter-btn" onclick="applyFilter('overdue', this)">Борги</button>
    <button class="filter-btn shop-btn" onclick="openShop()">🏷️ Титули</button>
</div>

<div id="activeTaskList"></div>

<details id="completedSection" style="display: none;">
    <summary>Виконані завдання (<span id="completedCount">0</span>)</summary>
    <div id="completedTaskList" class="completed-container"></div>
</details>

<div id="shopModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('shopModal')">×</button>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0; font-size:20px;">🏷️ Магазин Титулів</h2>
            <div class="coin-balance" id="coinBalance">💰 0</div>
        </div>
        <div id="titlesList"></div>
    </div>
</div>

<div id="confirmModal" class="modal-overlay" style="align-items: center;">
    <div class="modal-content" style="border-radius: 16px; width: 80%; transform: translateY(20px);">
        <div id="modalText" style="text-align: center; font-weight: bold; margin-bottom: 15px;">Ти дійсно виконав це завдання?</div>
        <div style="display: flex; gap: 10px;">
            <button id="modalCancelBtn" class="filter-btn" style="flex:1; font-size: 14px;" onclick="closeModal('confirmModal')">Ще роблю</button>
            <button id="modalConfirmBtn" class="filter-btn" style="flex:1; background: var(--button-color); color: white; font-size: 14px;">Так, готово!</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
    const API_URL = "https://telegram-proxy-bot-desz.onrender.com/api";
    const userId = tg.initDataUnsafe.user?.id || 1492389359; 
    const firstName = tg.initDataUnsafe.user?.first_name || 'Студент';
    
    let globalTasks = []; let currentFilter = 'all';
    let pendingTaskId = null; let pendingTaskState = null; let toastTimeout;

    // СЕРВЕРНІ ДАНІ ЮЗЕРА
    let myCoins = 0;
    let myTitles = ['Студент 🤓'];
    let activeTitle = 'Студент 🤓';

    const availableTitles = [
        { name: "Студент 🤓", price: 0, desc: "Стандартний статус" },
        { name: "Новачок 🐣", price: 20, desc: "Тільки почав свій шлях" },
        { name: "Спить на парах 😴", price: 100, desc: "Режим енергозбереження" },
        { name: "Дедлайн-кілер 🥷", price: 150, desc: "Здає за хвилину до кінця" },
        { name: "Код-машина 🤖", price: 250, desc: "Пише без багів (майже)" },
        { name: "Шукач автоматів 🎯", price: 300, desc: "Робить все заради 60 балів" },
        { name: "Гроза Деканату ⚡", price: 500, desc: "Елітний статус" }
    ];

    function updateHeaderInfo() {
        document.getElementById('userName').innerText = `Привіт, ${firstName}!`;
        document.getElementById('coinBalance').innerText = `💰 ${myCoins}`;
        
        const titleBadge = document.getElementById('userTitleBadge');
        if (activeTitle && activeTitle !== "Студент 🤓") { titleBadge.innerText = activeTitle; titleBadge.style.display = "inline-block"; } 
        else { titleBadge.style.display = "none"; }
    }

    function openShop() {
        const list = document.getElementById('titlesList'); list.innerHTML = "";
        availableTitles.forEach(t => {
            const isOwned = myTitles.includes(t.name); const isActive = activeTitle === t.name;
            let btnHtml = `<button class="buy-btn" onclick="buyTitle('${t.name}', ${t.price})">${t.price} 🪙</button>`;
            if (isActive) btnHtml = `<button class="buy-btn active-title">Вибрано ✅</button>`;
            else if (isOwned) btnHtml = `<button class="buy-btn owned" onclick="buyTitle('${t.name}', 0)">Надіти</button>`;
            list.innerHTML += `<div class="shop-item"><div class="shop-info"><h4>${t.name}</h4><p>${t.desc}</p></div>${btnHtml}</div>`;
        });
        openModal('shopModal');
    }

    async function buyTitle(name, price) {
        if (myTitles.includes(name)) {
            // Надіваємо куплений титул
            await fetch(`${API_URL}/user/${userId}/title`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'equip', title: name }) });
            activeTitle = name; updateHeaderInfo(); openShop(); tg.HapticFeedback.notificationOccurred('success');
        } else {
            if (myCoins >= price) {
                // Купуємо титул на сервері
                const res = await fetch(`${API_URL}/user/${userId}/title`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'buy', title: name, price: price }) });
                if(res.ok) {
                    myCoins -= price; myTitles.push(name); activeTitle = name;
                    updateHeaderInfo(); openShop(); confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); tg.HapticFeedback.notificationOccurred('success');
                } else showToast("Помилка покупки!");
            } else tg.showAlert(`Бракує коїнів! Треба ще ${price - myCoins} 🪙.`);
        }
    }

    async function loadData() {
        try {
            // Завантажуємо Інфу про гравця (Гроші і Статуси)
            const userRes = await fetch(`${API_URL}/user/${userId}`);
            if(userRes.ok) {
                const userData = await userRes.json();
                myCoins = userData.coins; activeTitle = userData.activeTitle || 'Студент 🤓';
                myTitles = userData.unlockedTitles ? userData.unlockedTitles.split(',') : ['Студент 🤓'];
            }
            updateHeaderInfo();

            // Завантажуємо Таски
            const tasksRes = await fetch(`${API_URL}/tasks/${userId}`);
            if (tasksRes.ok) { globalTasks = await tasksRes.json(); document.getElementById('filtersBlock').style.display = "flex"; document.getElementById('statsCard').style.display = "block"; renderTasks(); }

            // Завантажуємо Рейтинг
            const rankRes = await fetch(`${API_URL}/rank/${userId}`);
            if (rankRes.ok) {
                const rankData = await rankRes.json();
                let rText = "";
                if (rankData.rank === 1) rText = "🥇 1 місце"; else if (rankData.rank === 2) rText = "🥈 2 місце"; else if (rankData.rank === 3) rText = "🥉 3 місце"; else rText = `👤 ${rankData.rank}/${rankData.total} місце`;
                document.getElementById('rankBadge').innerText = rText;
            }
        } catch (e) { document.getElementById('activeTaskList').innerHTML = "<p style='text-align:center;'>Не вдалося завантажити дані ❌</p>"; }
    }

    function applyFilter(filterType, btnElement) {
        currentFilter = filterType;
        document.querySelectorAll('#filtersBlock .filter-btn').forEach(btn => { if (!btn.classList.contains('shop-btn')) btn.classList.remove('active'); });
        btnElement.classList.add('active'); tg.HapticFeedback.selectionChanged(); renderTasks();
    }

    function renderTasks() {
        const activeList = document.getElementById('activeTaskList'); const completedList = document.getElementById('completedTaskList');
        const completedSection = document.getElementById('completedSection'); const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        activeList.innerHTML = ""; completedList.innerHTML = "";

        if (globalTasks.length === 0) {
            activeList.innerHTML = "<p style='text-align:center;'>Завдань немає. Відпочивай! 🎉</p>";
            document.getElementById('progressWrapper').style.display = "none"; completedSection.style.display = "none"; return;
        }

        let activeTasks = globalTasks.filter(t => !t.IsCompleted && !t.isCompleted);
        const completedTasks = globalTasks.filter(t => t.IsCompleted || t.isCompleted);
        const percent = Math.round((completedTasks.length / globalTasks.length) * 100);
        const now = new Date(); const overdueCount = activeTasks.filter(t => (new Date(t.deadline || t.Deadline) - now) < 0).length;

        document.getElementById('streakBadge').className = overdueCount === 0 ? 'badge badge-green' : 'badge badge-red';
        document.getElementById('streakBadge').innerHTML = overdueCount === 0 ? '🔥 Без боргів' : `🧊 Боргів: ${overdueCount}`;

        document.getElementById('progressWrapper').style.display = "block"; progressText.innerText = `Мій прогрес: ${completedTasks.length} з ${globalTasks.length} (${percent}%)`;
        setTimeout(() => { progressBar.style.width = `${percent}%`; }, 100);

        if (currentFilter === 'overdue') activeTasks = activeTasks.filter(t => (new Date(t.deadline || t.Deadline) - now) < 0);
        
        if (activeTasks.length === 0) activeList.innerHTML = "<p style='text-align:center;'>У цій категорії чисто! 😎</p>";
        else renderGroupedTasks(activeTasks, activeList);

        if (completedTasks.length > 0) { completedSection.style.display = "block"; document.getElementById('completedCount').innerText = completedTasks.length; renderGroupedTasks(completedTasks, completedList); } 
        else completedSection.style.display = "none";
    }

    function renderGroupedTasks(tasksArray, container) {
        const grouped = {};
        tasksArray.forEach(task => { const subject = task.subject || task.Subject || "Інше"; if (!grouped[subject]) grouped[subject] = []; grouped[subject].push(task); });
        for (const subject in grouped) {
            grouped[subject].sort((a, b) => new Date(a.deadline || a.Deadline) - new Date(b.deadline || b.Deadline));
            const subjectHeader = document.createElement('div'); subjectHeader.className = 'subject-group-title'; subjectHeader.innerText = subject; container.appendChild(subjectHeader);
            grouped[subject].forEach(task => { container.appendChild(createTaskCard(task)); });
        }
    }

    function createTaskCard(task) {
        let title = task.title || task.Title; const deadlineStr = task.deadline || task.Deadline;
        const isCompleted = task.isCompleted !== undefined ? task.isCompleted : task.IsCompleted; const taskId = task.taskId || task.TaskId;
        const timeDiff = new Date(deadlineStr) - new Date(); const diffDays = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
        const dateStr = new Date(deadlineStr).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });

        let statusClass = "status-ok", borderClass = "card-ok", statusText = `Залишилось днів: ${diffDays} (до ${dateStr})`;
        if (diffDays < 0) { statusClass = "status-overdue"; borderClass = "card-overdue"; statusText = `ПРОТЕРМІНОВАНО! (до ${dateStr})`; } 

        const card = document.createElement('div'); card.id = `task-${taskId}`; card.className = `task-card ${borderClass} ${isCompleted ? 'completed' : ''}`;
        card.innerHTML = `<div class="task-info"><div class="task-subject">${task.subject || task.Subject}</div><div class="task-title">${title}</div><div class="task-deadline ${statusClass}">${isCompleted ? 'Виконано' : statusText}</div></div><div class="checkbox ${isCompleted ? 'checked' : ''}" onclick="openModal('confirmModal', ${taskId}, ${isCompleted})">${isCompleted ? '✓' : ''}</div>`;
        return card;
    }

    function openModal(modalId, taskId = null, state = null) {
        if (modalId === 'confirmModal') {
            pendingTaskId = taskId; pendingTaskState = state; tg.HapticFeedback.impactOccurred('light');
            document.getElementById('modalText').innerText = state ? "Повернути завдання в роботу?" : "Ти дійсно виконав це завдання?";
            document.getElementById('modalConfirmBtn').innerText = state ? "Повернути" : "Так, готово!";
        }
        document.getElementById(modalId).classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerHTML = `<span>${msg}</span>`; t.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove('show'), 3000); }

    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
        if (!pendingTaskId) return;
        const taskId = pendingTaskId, state = pendingTaskState; closeModal('confirmModal');
        tg.HapticFeedback.impactOccurred('medium'); document.getElementById(`task-${taskId}`).classList.add('completing');

        try {
            const response = await fetch(`${API_URL}/tasks/${userId}/complete/${taskId}`, { method: 'POST' });
            if (response.ok) {
                if (!state) { confetti({ particleCount: 100, origin: { y: 0.6 } }); showToast("Виконано! +10 🪙"); } else showToast("Повернуто в роботу");
                setTimeout(loadData, 400); // ОНОВЛЮЄ І ТАСКИ, І КОЇНИ З СЕРВЕРА
            } else showToast("Помилка на сервері ❌");
        } catch (e) { showToast("Помилка зв'язку ❌"); }
    });

    loadData();
</script>

</body>
</html>
