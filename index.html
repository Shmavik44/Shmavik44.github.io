<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h3 { margin: 0 0 5px 0; font-size: 20px; }
        .header p { color: var(--hint-color); font-size: 13px; margin: 0; }
        
        /* --- ПРОГРЕС-БАР --- */
        .progress-wrapper { margin-bottom: 25px; }
        .progress-text { font-size: 13px; color: var(--hint-color); margin-bottom: 6px; text-align: center; font-weight: bold; }
        .progress-track { background: var(--tg-theme-secondary-bg-color, #e0e0e0); border-radius: 10px; height: 8px; overflow: hidden; width: 80%; margin: 0 auto; }
        .progress-fill { background: var(--button-color); height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); border-radius: 10px; }

        /* --- КАРТКИ ЗАВДАНЬ --- */
        .task-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Базовий бортик для кольорових маркерів */
            border-left: 5px solid transparent; 
            /* Плавність для анімації натискання */
            transition: all 0.3s ease; 
        }

        /* Кольорові статуси для бортиків */
        .card-overdue { border-left-color: #e53935; }
        .card-soon { border-left-color: #ffa000; }
        .card-ok { border-left-color: #43a047; }
        
        .completed { opacity: 0.5; text-decoration: line-through; border-left-color: var(--hint-color); }

        /* Анімація зникнення картки */
        .completing {
            opacity: 0 !important;
            transform: translateX(-20px) scale(0.95);
        }

        .task-info { flex-grow: 1; }
        .task-subject { font-size: 12px; color: var(--hint-color); font-weight: bold; text-transform: uppercase; }
        .task-title { font-size: 16px; margin: 4px 0; }
        .task-deadline { font-size: 13px; }

        .status-overdue { color: #e53935; font-weight: bold; }
        .status-soon { color: #ffa000; font-weight: bold; }
        .status-ok { color: #43a047; }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--button-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            min-width: 24px;
        }

        .checkbox.checked::after {
            content: "✓";
            color: var(--button-color);
            font-weight: bold;
        }

        .subject-group-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--button-color);
            margin: 20px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding-bottom: 5px;
        }

        details {
            margin-top: 25px;
            border-top: 1px solid var(--hint-color);
            padding-top: 10px;
        }

        summary {
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            font-weight: bold;
            color: var(--hint-color);
            cursor: pointer;
        }

        summary::-webkit-details-marker { display: none; }
        summary::after {
            content: "▼";
            font-size: 12px;
            transition: transform 0.3s;
            color: var(--hint-color);
        }

        details[open] summary::after { transform: rotate(180deg); }

        .completed-container .task-card {
            background: transparent;
            border: 1px solid var(--tg-theme-secondary-bg-color, #f4f4f5);
            filter: grayscale(1);
            border-left-width: 1px; /* Прибираємо жирний кольоровий борт для виконаних */
        }
    </style>
</head>
<body>

<div class="header">
    <h3 id="userName">Привіт!</h3>
    <p>Твої навчальні завдання</p>
</div>

<div class="progress-wrapper" id="progressWrapper" style="display: none;">
    <div class="progress-text" id="progressText">Мій прогрес: 0%</div>
    <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
    </div>
</div>

<div id="activeTaskList">
    <p style="text-align: center;">Завантаження...</p>
</div>

<details id="completedSection" style="display: none;">
    <summary>Виконані завдання (<span id="completedCount">0</span>)</summary>
    <div id="completedTaskList" class="completed-container"></div>
</details>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = "https://telegram-proxy-bot-desz.onrender.com/api";
    const userId = tg.initDataUnsafe.user?.id || 1492389359; 
    document.getElementById('userName').innerText = `Привіт, ${tg.initDataUnsafe.user?.first_name || 'Студент'}!`;

    async function loadTasks() {
        try {
            const response = await fetch(`${API_URL}/tasks/${userId}`);
            const tasks = await response.json();
            renderTasks(tasks);
        } catch (e) {
            document.getElementById('activeTaskList').innerHTML = "<p>Не вдалося завантажити завдання :(</p>";
        }
    }

    function renderTasks(tasks) {
        const activeList = document.getElementById('activeTaskList');
        const completedList = document.getElementById('completedTaskList');
        const completedSection = document.getElementById('completedSection');
        const completedCount = document.getElementById('completedCount');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');

        activeList.innerHTML = "";
        completedList.innerHTML = "";

        if (tasks.length === 0) {
            activeList.innerHTML = "<p style='text-align:center;'>Завдань поки немає. Відпочивай! 🎉</p>";
            completedSection.style.display = "none";
            progressWrapper.style.display = "none";
            return;
        }

        const activeTasks = tasks.filter(t => !(t.isCompleted !== undefined ? t.isCompleted : t.IsCompleted));
        const completedTasks = tasks.filter(t => (t.isCompleted !== undefined ? t.isCompleted : t.IsCompleted));

        // --- ОНОВЛЕННЯ ПРОГРЕС-БАРУ ---
        progressWrapper.style.display = "block";
        const percent = Math.round((completedTasks.length / tasks.length) * 100);
        progressText.innerText = `Мій прогрес: ${completedTasks.length} з ${tasks.length} (${percent}%)`;
        // Маленька затримка для красивої анімації заповнення при завантаженні
        setTimeout(() => {
            progressBar.style.width = `${percent}%`;
        }, 100);

        if (activeTasks.length === 0) {
            activeList.innerHTML = "<p style='text-align:center;'>Усі активні завдання виконано! 🎉</p>";
        } else {
            renderGroupedTasks(activeTasks, activeList);
        }

        if (completedTasks.length > 0) {
            completedSection.style.display = "block";
            completedCount.innerText = completedTasks.length;
            renderGroupedTasks(completedTasks, completedList);
        } else {
            completedSection.style.display = "none";
        }
    }

    function renderGroupedTasks(tasksArray, container) {
        const grouped = {};
        
        tasksArray.forEach(task => {
            const subject = task.subject || task.Subject || "Інше";
            if (!grouped[subject]) grouped[subject] = [];
            grouped[subject].push(task);
        });

        for (const subject in grouped) {
            grouped[subject].sort((a, b) => {
                const dateA = new Date(a.deadline || a.Deadline);
                const dateB = new Date(b.deadline || b.Deadline);
                return dateA - dateB;
            });

            const subjectHeader = document.createElement('div');
            subjectHeader.className = 'subject-group-title';
            subjectHeader.innerText = subject;
            container.appendChild(subjectHeader);

            grouped[subject].forEach(task => {
                container.appendChild(createTaskCard(task, false)); 
            });
        }
    }

    function createTaskCard(task, showSubject = true) {
        const subject = task.subject || task.Subject;
        const title = task.title || task.Title;
        const deadlineStr = task.deadline || task.Deadline;
        const isCompleted = task.isCompleted !== undefined ? task.isCompleted : task.IsCompleted;
        const taskId = task.taskId || task.TaskId;

        const now = new Date();
        const deadline = new Date(deadlineStr);
        
        const timeDiff = deadline - now;
        const diffDays = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

        let statusClass = "status-ok";
        let cardBorderClass = "card-ok"; // Колір лівого краю
        let statusText = `Залишилось днів: ${diffDays}`;

        if (timeDiff < 0) {
            statusClass = "status-overdue";
            cardBorderClass = "card-overdue";
            statusText = "ПРОТЕРМІНОВАНО!";
        } else if (diffDays <= 2) {
            statusClass = "status-soon";
            cardBorderClass = "card-soon";
            statusText = `Дедлайн скоро! (${diffDays} дн.)`;
        }

        const card = document.createElement('div');
        card.id = `task-${taskId}`; // Додаємо ID для пошуку при анімації
        card.className = `task-card ${cardBorderClass} ${isCompleted ? 'completed' : ''}`;
        
        const subjectHtml = showSubject ? `<div class="task-subject">${subject}</div>` : '';

        card.innerHTML = `
            <div class="task-info">
                ${subjectHtml}
                <div class="task-title">${title}</div>
                <div class="task-deadline ${statusClass}">${isCompleted ? 'Виконано' : statusText}</div>
            </div>
            <div class="checkbox ${isCompleted ? 'checked' : ''}" onclick="toggleTask(${taskId}, ${isCompleted})"></div>
        `;
        return card;
    }

    function toggleTask(taskId, currentState) {
        if (!taskId) return;

        const msg = currentState ? "Повернути завдання в роботу?" : "Ти дійсно виконав це завдання?";
        
        tg.showConfirm(msg, async (confirmed) => {
            if (confirmed) {
                tg.HapticFeedback.impactOccurred('medium');
                
                // Додаємо клас анімації зникнення перед відправкою на сервер
                const cardElement = document.getElementById(`task-${taskId}`);
                if (cardElement) {
                    cardElement.classList.add('completing');
                }

                try {
                    const response = await fetch(`${API_URL}/tasks/${userId}/complete/${taskId}`, { method: 'POST' });
                    if (response.ok) {
                        // Робимо малу паузу (300мс), щоб анімація встигла програтись, і оновлюємо список
                        setTimeout(() => {
                            loadTasks(); 
                        }, 300);
                    } else {
                        tg.showAlert("Помилка на сервері!");
                        if (cardElement) cardElement.classList.remove('completing'); // Відміняємо анімацію при помилці
                    }
                } catch (e) {
                    tg.showAlert("Помилка зв'язку з сервером!");
                    if (cardElement) cardElement.classList.remove('completing');
                }
            }
        });
    }

    loadTasks();
</script>

</body>
</html>
