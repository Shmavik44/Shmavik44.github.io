<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої завдання</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        .task-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: opacity 0.3s;
        }

        .task-info { flex-grow: 1; }
        .task-subject { font-size: 12px; color: var(--hint-color); font-weight: bold; text-transform: uppercase; }
        .task-title { font-size: 16px; margin: 4px 0; }
        .task-deadline { font-size: 13px; }

        .status-overdue { color: #e53935; font-weight: bold; }
        .status-soon { color: #ffa000; font-weight: bold; }
        .status-ok { color: #43a047; }
        
        .completed { opacity: 0.5; text-decoration: line-through; }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--button-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }

        .checkbox.checked::after {
            content: "✓";
            color: var(--button-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 id="userName">Привіт!</h2>
    <p style="color: var(--hint-color)">Твої навчальні завдання</p>
</div>

<div id="taskList">
    <p style="text-align: center;">Завантаження...</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ТУТ ВКАЖИ АДРЕСУ СВОГО СЕРВЕРА (наприклад, з Render або ту, що дає хостинг)
    const API_URL = "https://telegram-proxy-bot-desz.onrender.com/api";
    
    const userId = tg.initDataUnsafe.user?.id || 1492389359; // Тестовий ID, якщо відкриваємо не в ТГ
    document.getElementById('userName').innerText = `Привіт, ${tg.initDataUnsafe.user?.first_name || 'Студент'}!`;

    async function loadTasks() {
        try {
            const response = await fetch(`${API_URL}/tasks/${userId}`);
            const tasks = await response.json();
            renderTasks(tasks);
        } catch (e) {
            document.getElementById('taskList').innerHTML = "<p>Не вдалося завантажити завдання :(</p>";
        }
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        list.innerHTML = "";

        if (tasks.length === 0) {
            list.innerHTML = "<p style='text-align:center;'>Завдань поки немає. Відпочивай! 🎉</p>";
            return;
        }

        tasks.forEach(task => {
            const now = new Date();
            // ТУТ УСІ ЗМІННІ З МАЛОЇ ЛІТЕРИ
            const deadline = new Date(task.deadline); 
            const diffDays = Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));

            let statusClass = "status-ok";
            let statusText = `Залишилось днів: ${diffDays}`;

            if (diffDays < 0) {
                statusClass = "status-overdue";
                statusText = "ПРОТЕРМІНОВАНО!";
            } else if (diffDays <= 2) {
                statusClass = "status-soon";
                statusText = `Дедлайн скоро! (${diffDays} дн.)`;
            }

            const card = document.createElement('div');
            card.className = `task-card ${task.isCompleted ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="task-info">
                    <div class="task-subject">${task.subject}</div>
                    <div class="task-title">${task.title}</div>
                    <div class="task-deadline ${statusClass}">${statusText}</div>
                </div>
                <div class="checkbox ${task.isCompleted ? 'checked' : ''}" onclick="toggleTask(${task.taskId}, ${task.isCompleted})"></div>
            `;
            list.appendChild(card);
        });
    }
    function toggleTask(taskId, currentState) {
        const msg = currentState ? "Повернути завдання в роботу?" : "Ти дійсно виконав це завдання?";
        
        tg.showConfirm(msg, async (confirmed) => {
            if (confirmed) {
                tg.HapticFeedback.impactOccurred('medium');
                await fetch(`${API_URL}/tasks/${userId}/complete/${taskId}`, { method: 'POST' });
                loadTasks(); // Перезавантажуємо список
            }
        });
    }

    loadTasks();
</script>

</body>
</html>
